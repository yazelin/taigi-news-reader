      <stop offset="0" stop-color="#f8faf7"/>
      <stop offset="1" stop-color="#e7f1e9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <circle cx="1128" cy="26" r="190" fill="#d9e9dc"/>
