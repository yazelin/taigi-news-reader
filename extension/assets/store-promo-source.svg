<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" role="img" aria-labelledby="title desc">
  <title id="title">台語新聞朗讀 Chrome 擴充套件宣傳圖</title>
  <desc id="desc">綠色台字朗讀圖示，搭配台語新聞朗讀與新聞文字一鍵轉成台語朗讀文字</desc>
  <rect width="440" height="280" fill="#f4f7f3"/>
  <circle cx="405" cy="30" r="80" fill="#e6f0e8"/>
  <circle cx="28" cy="260" r="90" fill="#fff0c6"/>
  <g transform="translate(28 48) scale(.36)">
    <rect x="16" y="16" width="480" height="480" rx="112" fill="#155b2c"/>
    <path d="M92 112c0-29 23-52 52-52h224c29 0 52 23 52 52v205c0 29-23 52-52 52H237l-92 77 21-77h-22c-29 0-52-23-52-52z" fill="#fffdf4"/>
    <text x="236" y="313" text-anchor="middle" font-family="Noto Sans CJK TC, Noto Sans TC, sans-serif" font-size="230" font-weight="800" fill="#155b2c">台</text>
