# Merge this small override on top of ../lan/compose.yaml for an Internet-facing
# beta. It deliberately does not duplicate the backend service definition.
services:
  backend:
    environment:
      # Keep the public-beta security posture in the deployment override, not
      # only in an operator-maintained env file. Requiring authentication here
      # makes a missing TAIGI_ACCESS_TOKEN_HASHES fail application startup.
      TAIGI_REQUIRE_ACCESS_TOKEN: "true"
      TAIGI_REQUIRE_ALLOWED_ORIGIN: "true"
      TAIGI_ALLOW_LOCALHOST_ORIGINS: "false"
      TAIGI_EXTENSION_IDS: "nejhlfbnjkbdjcaaklaofggkikdlpakn"
      # Defense in depth: the Internet beta never retains the synchronous route.
      # Strict token mode in the app also rejects startup if this is not false.
      TAIGI_ALLOW_DIRECT_SYNTHESIS: "false"
      # The extension currently creates 500-character chunks. POJ romanization
      # can expand Chinese source text well beyond four characters per source
      # character, so keep enough translated-text headroom while bounding
      # source text, audio, and daily spend independently.
      TAIGI_MAX_TEXT_CHARS: "600"
      TAIGI_MAX_TRANSLATED_CHARS: "6000"
      TAIGI_MAX_AUDIO_BYTES: "16777216"
      # Chunked CPU MMS keeps one deadline for the whole translated passage.
      # A near-cap passage can require multiple bounded model forwards.
      TAIGI_MMS_TIMEOUT_SECONDS: "480"
      TAIGI_DAILY_SUBJECT_JOB_LIMIT: "20"
      TAIGI_DAILY_SUBJECT_CHARACTER_LIMIT: "12000"
      TAIGI_DAILY_GLOBAL_JOB_LIMIT: "100"
      TAIGI_DAILY_GLOBAL_CHARACTER_LIMIT: "60000"
    # Fail closed instead of allowing retained/in-flight audio or a provider
    # fault to consume all RAM on the shared 192.168.11.11 host. Keep swap from
    # turning memory pressure into an unbounded slow-client resource drain.
    mem_limit: 2g
    mem_reservation: 512m
    memswap_limit: 2g
    # Four cores keep local MMS practical while preventing one container from
    # consuming every CPU on a larger shared host.
    cpus: "4.0"
